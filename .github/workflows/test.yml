name: Test app
on: 
  workflow_call:
jobs:
  test-app:
    runs-on: 'ubuntu-latest'

    steps:
      - name: checkout Repository
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test app
        run: python app.py
